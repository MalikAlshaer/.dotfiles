[window]
#opacity = 0.9
position = { x = 500, y = 250 }

[font]
# normal = { family = "Inconsolata Nerd Font", style = "Regular" }
size = 11.7 # xfce
# size = 7.8 # i3

# [font.normal]
# family = "InconsolataGo Nerd Font"
# style = "Regular"

[font.bold]
family = "InconsolataGo Nerd Font"
style = "Bold"

[font.bold_italic]
family = "InconsolataGo Nerd Font"
style = "Bold Italic"

[font.italic]
family = "InconsolataGo Nerd Font"
style = "Italic"


[colors.primary]
background = "0x1E1E1E"
foreground = "0xDCDCDC"

[colors.normal]
black = "0x000000"
blue = "0x268bd2"
cyan = "0x8BE9FD"
green = "0x50FA7B"
magenta = "0xFF79C6"
red = "0xFF5555"
white = "0xBBBBBB"
yellow = "0xF1FA8C"

[keyboard]
bindings = [
  { key = "Back", mods = "Control", chars = "\u0017" }
]
